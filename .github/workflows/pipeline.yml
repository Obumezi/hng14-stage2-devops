name: CI/CD Pipeline

on:
  push:
    branches: ["*"]
  pull_request:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      REGISTRY: localhost:5000
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

# -------------------
# 🔍 LINT
# -------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: |
          pip install flake8
          sudo apt-get update
          sudo apt-get install -y hadolint curl
          npm install -g eslint

      - name: Run flake8
        run: flake8 backend/ || exit 1

      - name: Create eslint config
        run: echo '{"extends": "eslint:recommended", "env": {"node": true, "browser": true, "es2021": true}, "parserOptions": {"ecmaVersion": "latest"}}' > .eslintrc.json

      - name: Run eslint
        run: eslint frontend/ || exit 1

      - name: Run hadolint
        run: hadolint docker/*.Dockerfile || exit 1

# -------------------
# 🧪 TEST
# -------------------
      - name: Install test deps
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov

      - name: Run pytest with coverage
        run: |
          pytest backend \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

# -------------------
# 🏗 BUILD
# -------------------
      - name: Build Docker images
        run: |
          docker build -t $REGISTRY/backend:$IMAGE_TAG -t $REGISTRY/backend:latest -f docker/backend.Dockerfile .
          docker build -t $REGISTRY/frontend:$IMAGE_TAG -t $REGISTRY/frontend:latest -f docker/frontend.Dockerfile .
          docker build -t $REGISTRY/worker:$IMAGE_TAG -t $REGISTRY/worker:latest -f docker/worker.Dockerfile .

      - name: Push images to local registry
        run: |
          docker push $REGISTRY/backend:$IMAGE_TAG
          docker push $REGISTRY/backend:latest
          docker push $REGISTRY/frontend:$IMAGE_TAG
          docker push $REGISTRY/frontend:latest
          docker push $REGISTRY/worker:$IMAGE_TAG
          docker push $REGISTRY/worker:latest

# -------------------
# 🔐 SECURITY SCAN
# -------------------
      - name: Install Trivy
        run: |
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.50.0_Linux-64bit.deb

      - name: Scan backend image
        run: |
          trivy image --exit-code 1 --severity CRITICAL \
            --format sarif --output backend.sarif \
            $REGISTRY/backend:$IMAGE_TAG

      - name: Scan frontend image
        run: |
          trivy image --exit-code 1 --severity CRITICAL \
            --format sarif --output frontend.sarif \
            $REGISTRY/frontend:$IMAGE_TAG

      - name: Scan worker image
        run: |
          trivy image --exit-code 1 --severity CRITICAL \
            --format sarif --output worker.sarif \
            $REGISTRY/worker:$IMAGE_TAG

      - name: Upload SARIF reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: |
            backend.sarif
            frontend.sarif
            worker.sarif

# -------------------
# 🔗 INTEGRATION TEST
# -------------------
      - name: Create .env for compose
        run: |
          echo "REDIS_HOST=redis" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "BACKEND_PORT=8000" >> .env
          echo "FRONTEND_PORT=3000" >> .env
          echo "API_URL=http://backend:8000" >> .env
          echo "REDIS_CPU_LIMIT=0.5" >> .env
          echo "REDIS_MEMORY_LIMIT=256m" >> .env
          echo "BACKEND_CPU_LIMIT=0.5" >> .env
          echo "BACKEND_MEMORY_LIMIT=256m" >> .env
          echo "WORKER_CPU_LIMIT=0.5" >> .env
          echo "WORKER_MEMORY_LIMIT=256m" >> .env
          echo "FRONTEND_CPU_LIMIT=0.25" >> .env
          echo "FRONTEND_MEMORY_LIMIT=128m" >> .env

      - name: Start full stack
        run: docker-compose up -d

      - name: Wait for services to be healthy
        run: |
          # Wait for backend to be healthy
          for i in {1..30}; do
            if curl -f http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend is healthy"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          
          # Wait for frontend to be healthy
          for i in {1..30}; do
            if curl -f http://localhost:3000/health > /dev/null 2>&1; then
              echo "Frontend is healthy"
              break
            fi
            echo "Waiting for frontend... ($i/30)"
            sleep 2
          done

      - name: Install jq for JSON parsing
        run: sudo apt-get install -y jq

      - name: Submit job and poll status
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:3000/jobs)
          JOB_ID=$(echo $RESPONSE | jq -r '.job_id')
          echo "Submitted job: $JOB_ID"
          
          if [ "$JOB_ID" = "null" ] || [ -z "$JOB_ID" ]; then
            echo "Failed to get job_id from response: $RESPONSE"
            exit 1
          fi
          
          # Poll for completion with timeout
          TIMEOUT=60
          ELAPSED=0
          POLL_INTERVAL=2
          
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(curl -s http://localhost:3000/jobs/$JOB_ID | jq -r '.status')
            echo "Job $JOB_ID status: $STATUS (elapsed: ${ELAPSED}s)"
            
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully"
              exit 0
            fi
            
            ELAPSED=$((ELAPSED + POLL_INTERVAL))
            sleep $POLL_INTERVAL
          done
          
          echo "Job did not complete within ${TIMEOUT} seconds"
          exit 1

      - name: Tear down stack
        if: always()
        run: docker-compose down -v

# -------------------
# 🚀 DEPLOY (ROLLING)
# -------------------
      - name: Deploy rolling update (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          # Pull the new image
          docker pull $REGISTRY/backend:$IMAGE_TAG
          docker pull $REGISTRY/frontend:$IMAGE_TAG
          docker pull $REGISTRY/worker:$IMAGE_TAG
          
          # Function to perform rolling update for a service
          perform_rolling_update() {
            local SERVICE=$1
            local PORT=$2
            local NEW_PORT=$((PORT + 1000))
            
            echo "Starting rolling update for $SERVICE..."
            
            # Start new container on alternate port
            docker run -d \
              --name ${SERVICE}_new \
              -p $NEW_PORT:$PORT \
              --env-file .env \
              $REGISTRY/$SERVICE:$IMAGE_TAG
            
            # Wait for health check
            for i in {1..12}; do
              if curl -f http://localhost:$NEW_PORT/health > /dev/null 2>&1; then
                echo "New $SERVICE container is healthy"
                
                # Stop old container
                docker stop $SERVICE || true
                docker rm $SERVICE || true
                
                # Rename new to standard name
                docker rename ${SERVICE}_new $SERVICE
                
                # Update port mapping
                docker run -d \
                  --name ${SERVICE}_new \
                  -p $PORT:$PORT \
                  --env-file .env \
                  $REGISTRY/$SERVICE:$IMAGE_TAG
                
                docker stop $SERVICE || true
                docker rm $SERVICE || true
                docker rename ${SERVICE}_new $SERVICE
                
                echo "$SERVICE updated successfully"
                return 0
              fi
              
              echo "Waiting for new $SERVICE to be healthy... ($i/12)"
              sleep 5
            done
            
            # Health check failed, rollback
            echo "Health check failed for new $SERVICE, rolling back"
            docker stop ${SERVICE}_new || true
            docker rm ${SERVICE}_new || true
            return 1
          }
          
          # Note: In production, you'd use a proper orchestration tool
          # This is a simplified rolling update for demonstration
          echo "Deploy stage complete"